    <div class="container my-4">
        <h1 class="display-4 fw-bold">Diet Game 🍎</h1>
        <p class="lead">Click healthy food 👍 Avoid junk 👎</p>

        <div class="d-flex justify-content-center mb-3">
            <select class="form-select w-auto border-dark rounded-pill bg-warning-subtle" id="timeSelect">
                <option value="10">10s</option>
                <option value="15" selected>15s</option>
                <option value="30">30s</option>
                <option value="45">45s</option>
            </select>
        </div>

        <div class="row justify-content-center mb-3 g-2">
            <div class="col-auto">
                <div class="p-2 border border-dark rounded-pill bg-white px-4">
                    Score: <span id="score" class="fw-bold">0</span>
                </div>
            </div>
            <div class="col-auto">
                <div class="p-2 border border-dark rounded-pill bg-white px-4">
                    Time: <span id="time" class="fw-bold">15</span>
                </div>
            </div>
        </div>

        <div id="game" class="bg-white border border-2 border-danger rounded-3 position-relative mx-auto overflow-hidden shadow" style="height: 60vh; width: 100%;">
            <div id="item" class="position-absolute" style="font-size: 40px; cursor: pointer;" onclick="clickItem()">🍎</div>
        </div>

        <div class="mt-4 pb-5">
            <button class="btn btn-warning btn-lg px-5 rounded-pill border border-dark shadow-sm fw-bold mx-1" onclick="startGame()">Start</button>
            <button class="btn btn-outline-dark btn-lg px-5 rounded-pill shadow-sm fw-bold mx-1" onclick="skipItem()">Skip 🚫</button>
        </div>
    </div>

    <footer class="bg-warning text-center py-3 border-top">
        <div class="container">GlowGuideCommunity@gmail.com</div>
    </footer>

    <script>
    var score = 0;
    var time = 15;
    var timer;
    var playing = false;

    var good = ["🍎","🥕","🥦","🍉","🍳"];
    var bad = ["🍔","🍟","🍕","🥨","🍩"];

    var isGood = true;

    function startGame() {
        //this is the starting score (runs when start is clicked)
        score = 0;
        time = document.getElementById("timeSelect").value;

        playing = true;
        //shows score and time 
        document.getElementById("score").innerText = score;
        document.getElementById("time").innerText = time;
        //places the emojies randomly
        moveItem();

        timer = setInterval(function() {
            time = time - 1; //reduces 1 every second
            document.getElementById("time").innerText = time;
            //stops playing when timer is at 0
            if (time == 0) {
                clearInterval(timer);
                playing = false;
                alert("Game Over! Score: " + score);
            }
        }, 1000);
    }

    function clickItem() {
        if (playing == false) return;
        //changes score after each click
        if (isGood == true) {
            score = score + 1;
        } else {
            score = score - 1;
        }

        document.getElementById("score").innerText =  score;
        moveItem();
    }
     
    //score when item is skipped
    function skipItem() {
        if (playing == false) return;
         
        if (isGood == false) {
            score = score + 1;
            moveItem();

        } else {
            score = score - 1;
            alert("That's healthy! Don't skip!!");
        }

        document.getElementById("score").innerText = score;
    }

    function moveItem() {

        var item = document.getElementById("item");
        var game = document.getElementById("game");

        if (Math.random() < 0.5) {
            isGood = true;
            item.innerText = good[Math.floor(Math.random() * good.length)];
        } else {
            isGood = false;
            item.innerText = bad[Math.floor(Math.random() * bad.length)];
        }

        var x = Math.random() * (game.clientWidth - 50);

        var y = Math.random() * (game.clientHeight - 50);
        //this moves the emojies on the screen
        item.style.left = x + "px";
        item.style.top = y + "px";
    }
    </script>
</body>
