<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Meal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container my-5" style="max-width: 500px;">
        <div class="card p-4 shadow border-warning">
            <h2 class="text-center mb-4">Add a Meal</h2>

            <form action="process_meal.php" method="POST">
                <div class="mb-3">
                    <label class="form-label">Meal Name</label>
                    <input type="text" id="mName" name="meal_name" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Calories (kcal)</label>
                    <input type="number" id="mCal" name="calories" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Protein (g)</label>
                    <input type="number" id="mPro" name="protein" class="form-control">
                </div>

                <button type="submit" class="btn btn-warning w-100 mb-2">Add to Progress</button>
            </form>

            <button class="btn btn-outline-danger w-100" onclick="clearProgress()">Reset All Progress</button>

            <hr>
            <a href="Diet.html" class="btn btn-link w-100">Back to Diet Page</a>
        </div>
    </div>

    <script>
        function clearProgress() {
            localStorage.setItem('eatenCal', 0);
            localStorage.setItem('eatenPro', 0);
            alert("Progress Reset!");
        }
    </script>
</body>
</html>
