<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strength Workouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center my-5">

    <a href="Fitness.html" class="btn btn-secondary mb-4">Back</a>

    <h2>Strength Workouts</h2>

    <div class="row" id="box"></div>

</div>

<script>
    let workouts = [
        {
            name: "Push-Ups",
            image: "pushup.jpg",
            info: "Start in a plank position with your hands under your shoulders. Lower your body until your chest is close to the ground, then push back up. Keep your body straight. Repeat 8–15 times. This builds chest, shoulders, and arm strength."
        },
        {
            name: "Squats",
            image: "squats.jpg",
            info: "Stand with your feet shoulder-width apart. Lower your body like you're sitting in a chair, then push back up. Keep your back straight and knees aligned. Repeat 10–15 times. This strengthens legs and glutes."
        },
        {
            name: "Lunges",
            image: "lunges.jpg",
            info: "Step forward with one leg and lower your body until both knees are bent at 90 degrees. Push back to standing and switch legs. Repeat 10 times each leg. This improves leg strength and balance."
        },
        {
            name: "Glute Bridge",
            image: "glutebridge.jpg",
            info: "Lie on your back with knees bent and feet flat on the floor. Lift your hips up by squeezing your glutes, then slowly lower back down. Repeat 10–15 times. This strengthens glutes and lower back."
        }
    ];

    let box = document.getElementById("box");

    for (let i = 0; i < workouts.length; i++) {
        box.innerHTML += `
            <div class="col-md-3 mb-4">
                <div class="card p-2">
                    <img src="${workouts[i].image}" width="100%" height="150">
                    <h5>${workouts[i].name}</h5>
                    <p>${workouts[i].info}</p>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
