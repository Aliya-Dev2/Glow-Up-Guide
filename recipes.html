<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthy Recipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center my-5">

    <a href="Diet.html" class="btn btn-secondary mb-4">Back</a>

    <h2>Recipes</h2>

    <div class="row" id="box"></div>

</div>

<script>
    let recipes = [
        {
            name: "Avocado Toast",
            image: "avocado.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            Bread, 1 ripe avocado, salt, pepper, lemon juice (optional)<br><br>

            <strong>Steps:</strong><br>
            1. Toast 1–2 slices of bread until golden and crispy.<br>
            2. Cut the avocado in half, remove the seed, and scoop into a bowl.<br>
            3. Mash with a fork until smooth or slightly chunky.<br>
            4. Add a pinch of salt, pepper, and a few drops of lemon juice.<br>
            5. Spread the avocado evenly on the toast.<br>
            6. Serve immediately.
            `
        },
        {
            name: "Berry Smoothie",
            image: "berry.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            1 cup mixed berries, 1 cup milk, 1 tbsp honey<br><br>

            <strong>Steps:</strong><br>
            1. Add berries to a blender.<br>
            2. Pour in the milk.<br>
            3. Add honey for sweetness.<br>
            4. Blend for 30–60 seconds until smooth.<br>
            5. Taste and adjust sweetness if needed.<br>
            6. Pour into a glass and serve cold.
            `
        },
        {
            name: "Quinoa Bowl",
            image: "quinoa.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            1 cup quinoa, 2 cups water, vegetables, olive oil<br><br>

            <strong>Steps:</strong><br>
            1. Rinse quinoa under cold water.<br>
            2. Add quinoa and water to a pot and bring to a boil.<br>
            3. Reduce heat, cover, and cook for 15 minutes.<br>
            4. Turn off heat and let it sit for 5 minutes.<br>
            5. Fluff with a fork.<br>
            6. Add chopped vegetables and drizzle olive oil on top.
            `
        },
        {
            name: "Grilled Salmon",
            image: "salmon.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            Salmon fillet, salt, pepper, lemon<br><br>

            <strong>Steps:</strong><br>
            1. Preheat grill or pan to medium heat.<br>
            2. Pat salmon dry with a paper towel.<br>
            3. Season both sides with salt and pepper.<br>
            4. Place salmon on the grill, skin side down.<br>
            5. Cook for 4–5 minutes, then flip carefully.<br>
            6. Cook another 3–4 minutes until done.<br>
            7. Squeeze lemon juice on top before serving.
            `
        },
        {
            name: "Greek Yogurt Parfait",
            image: "parfait.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            Greek yogurt, granola, fresh fruits<br><br>

            <strong>Steps:</strong><br>
            1. Take a glass or bowl.<br>
            2. Add a layer of yogurt at the bottom.<br>
            3. Add a layer of fruits.<br>
            4. Sprinkle granola on top.<br>
            5. Repeat layers if desired.<br>
            6. Serve immediately.
            `
        },
        {
            name: "Chia Pudding",
            image: "chia.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            2 tbsp chia seeds, 1 cup milk, honey<br><br>

            <strong>Steps:</strong><br>
            1. Add chia seeds to a bowl or jar.<br>
            2. Pour in the milk and stir well.<br>
            3. Add honey and mix again.<br>
            4. Let it sit for 5 minutes, then stir again.<br>
            5. Cover and refrigerate overnight.<br>
            6. Stir before serving and add toppings if desired.
            `
        },
        {
            name: "Green Salad",
            image: "salad.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            Lettuce, cucumber, tomato, dressing<br><br>

            <strong>Steps:</strong><br>
            1. Wash all vegetables thoroughly.<br>
            2. Chop lettuce, cucumber, and tomatoes.<br>
            3. Add everything to a large bowl.<br>
            4. Pour dressing over the salad.<br>
            5. Toss gently to mix.<br>
            6. Serve fresh.
            `
        },
        {
            name: "Baked Sweet Potato",
            image: "potato.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            Sweet potato, olive oil, salt<br><br>

            <strong>Steps:</strong><br>
            1. Preheat oven to 200°C.<br>
            2. Wash and scrub the sweet potato.<br>
            3. Poke holes with a fork.<br>
            4. Rub lightly with olive oil and sprinkle salt.<br>
            5. Place on baking tray.<br>
            6. Bake for 40–50 minutes until soft.<br>
            7. Let cool slightly and serve.
            `
        },
        {
            name: "Oatmeal with Nuts",
            image: "oats.jpg",
            info: `
            <strong>Ingredients:</strong><br>
            1/2 cup oats, 1 cup milk, nuts<br><br>

            <strong>Steps:</strong><br>
            1. Add oats and milk to a pot.<br>
            2. Cook on medium heat, stirring occasionally.<br>
            3. After 5–7 minutes, oats will thicken.<br>
            4. Turn off heat.<br>
            5. Add nuts and mix.<br>
            6. Serve warm.
            `
        }
    ];

    let box = document.getElementById("box");

    for (let i = 0; i < recipes.length; i++) {
        box.innerHTML += `
            <div class="col-md-3 mb-4">
                <div class="card p-2">
                    <img src="${recipes[i].image}" width="100%" height="150">
                    <h5>${recipes[i].name}</h5>
                    <p>${recipes[i].info}</p>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
