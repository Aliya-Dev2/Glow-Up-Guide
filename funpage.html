      <h1>Diet Game 🍎</h1>
<p>Click healthy food 👍 Avoid junk 👎</p>

<select class= select-btn id="timeSelect">
    <option value="10">10s</option>
    <option value="15">15s</option>
    <option value="30">30s</option>
    <option value="45">45s</option>
</select>

<p>Score: <span id="score">0</span></p>
<p>Time: <span id="time">15</span></p>

<div id="game">
    <div id="item" onclick="clickItem()">🍎</div>
</div>

<br>
<button class="btn-pill" onclick="startGame()">Start</button>
<button class="btn-pill" onclick="skipItem()">Skip 🚫</button>

<script>
var score = 0;
var time = 15;
var timer;
var playing = false;

var good = ["🍎","🥕","🥦","🍉","🍳"];
var bad = ["🍔","🍟","🍕","🥨","🍩"];

var isGood = true;

function startGame() {
    //this is the starting score (runs when start is clicked)
    score = 0;
    time = document.getElementById("timeSelect").value;

    playing = true;
    //shows score and time 
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;
    //places the emojies randomly
    moveItem();

    timer = setInterval(function() {
        time = time - 1; //reduces 1 every second
        document.getElementById("time").innerText = time;
        //stops playing when timer is at 0
        if (time == 0) {
            clearInterval(timer);
            playing = false;
            alert("Game Over! Score: " + score);
        }
    }, 1000);
}

function clickItem() {
    if (playing == false) return;
    //changes score after each click
    if (isGood == true) {
        score = score + 1;
    } else {
        score = score - 1;
    }

    document.getElementById("score").innerText =  score;
    moveItem();
}
 
//score when item is skipped
function skipItem() {
    if (playing == false) return;
     
    if (isGood == false) {
        score = score + 1;
        moveItem();

    } else {
        score = score - 1;
        alert("That's healthy! Don't skip!!");
    }

    document.getElementById("score").innerText = score;
}

function moveItem() {

    var item = document.getElementById("item");
    var game = document.getElementById("game");

    if (Math.random() < 0.5) {
        isGood = true;
        item.innerText = good[Math.floor(Math.random() * good.length)];
    } else {
        isGood = false;
        item.innerText = bad[Math.floor(Math.random() * bad.length)];
    }

    var x = Math.random() * (game.clientWidth - 50);

    var y = Math.random() * (game.clientHeight - 50);
    //this moves the emojies on the screen
    item.style.left = x + "px";
    item.style.top = y + "px";
}
</script>
